<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Crypto Wallah</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #0f172a;
        color: #e5e7eb;
      }

      /* HEADER */
      header {
        background: linear-gradient(90deg, #2563eb, #1e40af);
        padding: 15px 0;
      }

      header .container {
        width: 90%;
        margin: auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      header h1 {
        color: white;
        font-size: 1.8rem;
      }

      header nav {
        flex: 1;
        display: flex;
        justify-content: center;
      }

      header nav ul {
        list-style: none;
        display: flex;
        gap: 30px;
      }

      header nav ul li a {
        text-decoration: none;
        color: white;
        padding: 8px 12px;
      }

      header nav ul li a:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .menu-toggle {
        display: none;
        font-size: 28px;
        color: white;
        cursor: pointer;
      }

      /* CONTACT */
      .contact-section {
        padding: 80px 20px;
        text-align: center;
      }

      .contact-container {
        max-width: 500px;
        margin: auto;
        background: #020617;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 30px #00000066;
      }

      .form-group {
        margin-bottom: 20px;
        text-align: left;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
      }

      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid #1e293b;
        background: #0f172a;
        color: white;
      }

      .form-group input:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: #2563eb;
      }

      .btn {
        width: 100%;
        padding: 12px;
        background: #2563eb;
        border: none;
        border-radius: 6px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn:hover {
        background: #1d4ed8;
      }

      .success-msg {
        margin-top: 15px;
        color: #22c55e;
        display: none;
      }

      footer {
        text-align: center;
        padding: 20px;
        margin-top: 40px;
        background: #020617;
      }

      @media (max-width: 768px) {
        .menu-toggle {
          display: block;
          font-size: 28px;
          cursor: pointer;
          position: absolute;
          right: 20px;
        }

        header .container {
          position: relative;
        }

        header nav ul {
          position: fixed;
          top: 60px;
          right: -100%;
          height: calc(100vh - 60px);
          width: 250px;
          background: #1e3a8a;
          flex-direction: column;
          justify-content: flex-start;
          align-items: center;
          padding-top: 30px;
          gap: 30px;
          transition: 0.3s ease;
          z-index: 1000;
        }

        header nav ul li {
          padding: 8px 0;
        }

        header nav ul.active {
          right: 0;
        }
      }

      .profile-menu {
        position: relative;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        color: white;
      }

      .profile-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #fd5900;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        color: white;
      }

      .profile-dropdown {
        display: none;
        position: absolute;
        top: 40px;
        right: 0;
        background: #1e3a8a;
        border-radius: 8px;
        min-width: 150px;
        overflow: hidden;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      }

      .profile-dropdown a {
        display: block;
        padding: 10px;
        text-decoration: none;
        color: white;
        font-size: 0.9rem;
      }

      .profile-dropdown a:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .profile-menu.active .profile-dropdown {
        display: block;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <h1>Currency Converter</h1>

        <div class="menu-toggle" id="menu-toggle">
          <i class="fa-solid fa-bars"></i>
        </div>

        <nav>
          <ul id="nav-links">
            <li><a href="main.html">Home</a></li>
            <li><a href="main.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="login.html">Login</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <section class="contact-section">
      <div class="contact-container">
        <h2>Contact Us</h2>
        <p>Send us a message</p>

        <!-- REPLACE YOUR_FORM_ID BELOW -->
        <form
          id="contact-form"
          action="https://formspree.io/f/xzdalokv"
          method="POST"
        >
          <div class="form-group">
            <label>Name</label>
            <input
              placeholder="Enter Your Name"
              type="text"
              name="name"
              required
            />
          </div>

          <div class="form-group">
            <label>Email</label>
            <input
              placeholder="Enter Your Email"
              type="email"
              name="email"
              required
            />
          </div>

          <div class="form-group">
            <label>Message</label>
            <textarea
              placeholder="Enter Your Message"
              name="message"
              rows="5"
              required
            ></textarea>
          </div>

          <button type="submit" class="btn">Send Message</button>

          <div class="success-msg" id="success-msg">
            Message sent successfully!
          </div>
        </form>
      </div>
    </section>

    <footer>© 2026 Crypto Wallah. All Rights Reserved.</footer>

    <script>
      /* HAMBURGER */
      const toggle = document.getElementById("menu-toggle");
      const nav = document.getElementById("nav-links");

      toggle.addEventListener("click", () => {
        nav.classList.toggle("active");
      });

      // Close menu when clicking outside
      document.addEventListener("click", (e) => {
        if (!nav.contains(e.target) && !toggle.contains(e.target)) {
          nav.classList.remove("active");
        }
      });

      /* AJAX FORM */
      const form = document.getElementById("contact-form");
      const success = document.getElementById("success-msg");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        const data = new FormData(form);

        const response = await fetch(form.action, {
          method: "POST",
          body: data,
          headers: { Accept: "application/json" },
        });

        if (response.ok) {
          success.style.display = "block";
          form.reset();
        } else {
          alert("Error sending message");
        }
      });

      document
        .getElementById("contactForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const name = document.getElementById("name").value;
          const email = document.getElementById("email").value;
          const message = document.getElementById("message").value;

          const response = await fetch("/api/contact", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, message }),
          });

          const data = await response.json();

          if (data.success) {
            alert("Message Sent Successfully!");
          } else {
            alert("Error sending message");
          }
        });
    </script>
  </body>
</html>
